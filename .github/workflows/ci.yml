name: CI/CD Pipeline for RSHIM (Debuild + RPM)

on:
  push:
    branches:
      - '**'
    tags:
      - '*'

permissions:
  contents: write
#  ^^^ ensures GITHUB_TOKEN can write to releases

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          tags: true

      - name: Install dependencies (for .deb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential debhelper devscripts fakeroot git \
            libpci-dev libusb-1.0-0-dev libfuse-dev pkg-config

      - name: Create source tarball
        run: |
          [ -d dist ] || mkdir -p dist
          version="$(./scripts/getver.sh)"
          tarball="rshim-src-${version}.tar.gz"
          git archive --format=tar.gz -o "$tarball" HEAD
          mv -v "$tarball" dist/
          ls -lh dist

      - name: Build x86_64 deb package
        run: |
          ./scripts/update_deb_ver.sh "$(./scripts/getver.sh)"
          DEB_BUILD_OPTIONS="nocheck nostrip" dpkg-buildpackage \
            -us -uc -a amd64
          mv -v ../*.deb dist/ || echo "No x86_64 .deb files found."
          ls -lh dist

      - name: Capture UID/GID for Docker
        id: uidgid
        run: |
          echo "HOST_UID=$(id -u)" >> $GITHUB_ENV
          echo "HOST_GID=$(id -g)" >> $GITHUB_ENV

      - name: Build ARM64 .deb package in Docker
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

          docker run --rm --platform linux/arm64 \
            -e HOST_UID="${{ env.HOST_UID }}" \
            -e HOST_GID="${{ env.HOST_GID }}" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            arm64v8/ubuntu:22.04 \
            /bin/bash -c "
              apt-get update && \
              apt-get install -y build-essential debhelper devscripts \
                fakeroot gcc git libpci-dev libusb-1.0-0-dev libfuse-dev \
                pkg-config && \
              git config --global --add safe.directory /workspace && \
              ./scripts/update_deb_ver.sh \$(./scripts/getver.sh) && \
              mkdir -p /workspace/build && \
              DEB_BUILD_OPTIONS='nocheck nostrip' \
                dpkg-buildpackage -us -uc -a arm64 && \
              mv -v ../*.deb /workspace/build/ && \
              chown -R \$HOST_UID:\$HOST_GID /workspace/build
            "
          mv -v build/*.deb dist/ || echo "No arm64 .deb files found."
          ls -lh dist

      - name: Build x86_64 RPM using Rocky Linux
        run: |
          docker run --rm \
            -e HOST_UID="${{ env.HOST_UID }}" \
            -e HOST_GID="${{ env.HOST_GID }}" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            quay.io/rockylinux/rockylinux:8 \
            /bin/bash -c "
              yum -y install gcc make rpm-build git \
                autoconf automake libtool pkgconfig \
                pciutils-devel libusb1-devel fuse-devel && \
              git config --global --add safe.directory /workspace && \
              ARCH=x86_64 ./build-rpm && \
              chown -R \$HOST_UID:\$HOST_GID /workspace
            "
          # Our build-rpm script places output in rpmbuild/RPMS/x86_64
          find . -type f -name '*.rpm' -exec mv -v {} dist/ \; || true
          ls -lh dist

      - name: Build arm64 RPM using Rocky Linux
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

          docker run --rm --platform linux/arm64 \
            -e HOST_UID="${{ env.HOST_UID }}" \
            -e HOST_GID="${{ env.HOST_GID }}" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            quay.io/rockylinux/rockylinux:8 \
            /bin/bash -c "
              yum -y install gcc make rpm-build git \
                autoconf automake libtool pkgconfig \
                pciutils-devel libusb1-devel fuse-devel && \
              git config --global --add safe.directory /workspace && \
              ARCH=aarch64 ./build-rpm && \
              chown -R \$HOST_UID:\$HOST_GID /workspace
            "
          # Our build-rpm script places output in rpmbuild/RPMS/aarch64
          find . -type f -name '*.rpm' -exec mv -v {} dist/ \; || true
          ls -lh dist


      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rshim-packages
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref_name, 'rshim-')
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Release for ${{ github.ref_name }}."
          draft: false
          prerelease: false
          artifacts: |
            dist/*
