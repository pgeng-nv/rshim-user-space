name: CI/CD Pipeline for RSHIM (Debuild)

on:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0    # Fetch all history
          tags: true        # Fetch tags

      - name: Set up environment for x86_64
        run: |
          sudo apt update && sudo apt install -y \
          build-essential debhelper devscripts fakeroot git \
          libpci-dev libusb-1.0-0-dev libfuse-dev pkg-config

      - name: Build x86_64 .deb package
        run: |
          ./scripts/update_deb_ver.sh $(./scripts/getver.sh)
          DEB_BUILD_OPTIONS="nocheck nostrip" dpkg-buildpackage -us -uc -a amd64
          ls ..

      - name: Build ARM64 .deb package in Docker
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/workspace -w /workspace arm64v8/ubuntu:22.04 /bin/bash -c "
          apt update &&
          apt install -y build-essential debhelper devscripts fakeroot gcc git \
          libpci-dev libusb-1.0-0-dev libfuse-dev pkg-config &&
          git config --global --add safe.directory /workspace &&
          ./scripts/update_deb_ver.sh \$(./scripts/getver.sh) &&
          mkdir -p /workspace/build &&
          DEB_BUILD_OPTIONS='nocheck nostrip' dpkg-buildpackage -us -uc -a arm64 &&
          mv ../*.deb /workspace/build/
          "
          ls build

      - name: Move .deb files to working directory
        run: |
          mkdir -p deb_packages
          mv ../*.deb deb_packages/ || echo "No x86_64 .deb files found."
          mv build/*deb deb_packages/ || echo "No ARM64 .deb files found."

      - name: Upload .deb files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rshim-deb-packages
          path: deb_packages/*deb

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-and-test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up environment for x86_64
        run: |
          sudo apt update && sudo apt install -y \
          build-essential debhelper devscripts fakeroot \
          libpci-dev libusb-1.0-0-dev libfuse-dev pkg-config

      - name: Set up environment for ARM64
        run: |
          sudo apt update && sudo apt install -y \
          gcc-aarch64-linux-gnu qemu-user-static \
          libpci-dev:arm64 libusb-1.0-0-dev:arm64 libfuse-dev:arm64 pkg-config

      - name: Generate original tarball
        run: |
          version=$(./scripts/getver.sh)
          git archive --prefix=rshim-${version}/ HEAD | gzip > ../rshim_${version}.orig.tar.gz

      - name: Build x86_64 .deb package
        run: |
          ./scripts/update_deb_ver.sh $(./scripts/getver.sh)
          dpkg-buildpackage -us -uc -a amd64

      - name: Build ARM64 .deb package
        env:
          CC: aarch64-linux-gnu-gcc
        run: |
          ./scripts/update_deb_ver.sh $(./scripts/getver.sh)
          dpkg-buildpackage -us -uc -a arm64

      - name: Move .deb files to working directory
        run: |
          mkdir -p deb_packages
          mv ../*.deb deb_packages/

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false

      - name: Upload .deb files to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: deb_packages/*.deb
          asset_name: "rshim_${{ github.ref_name }}.deb"
          asset_content_type: application/vnd.debian.binary-package
