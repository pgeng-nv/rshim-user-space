name: CI/CD Pipeline for RSHIM (Debuild)

on:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch full history including all tags

      - name: Set up environment
        run: |
          sudo apt update && sudo apt install -y \
          build-essential debhelper devscripts fakeroot \
          libpci-dev libusb-1.0-0-dev libfuse-dev

      - name: Generate original tarball
        run: |
          version=$(./scripts/getver.sh)
          git archive --prefix=rshim-${version}/ HEAD | gzip > ../rshim_${version}.orig.tar.gz

      - name: Update version and build .deb package
        run: |
          ./scripts/update_deb_ver.sh $(./scripts/getver.sh)
          echo y | debuild -us -uc

      - name: Move .deb files to working directory
        run: |
          mkdir -p deb_packages
          mv ../*.deb deb_packages/

      - name: Upload .deb files as artifacts
        uses: actions/upload-artifact@v3
        with:
          name: rshim-deb-packages
          path: deb_packages/*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-and-test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Ensure full history including all tags

      - name: Set up environment
        run: |
          sudo apt update && sudo apt install -y \
          build-essential debhelper devscripts fakeroot \
          libpci-dev libusb-1.0-0-dev libfuse-dev

      - name: Generate original tarball
        run: |
          version=$(./scripts/getver.sh)
          git archive --prefix=rshim-${version}/ HEAD | gzip > ../rshim_${version}.orig.tar.gz

      - name: Update version and build .deb package
        run: |
          ./scripts/update_deb_ver.sh $(./scripts/getver.sh)
          echo y | debuild -us -uc

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false

      - name: Upload .deb files to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ../*.deb
          asset_name: "rshim_${{ github.ref_name }}.deb"
          asset_content_type: application/vnd.debian.binary-package

