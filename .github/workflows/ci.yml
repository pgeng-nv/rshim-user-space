name: CI/CD Pipeline for RSHIM (Debuild + RPM)

on:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          tags: true

      - name: Install dependencies for .deb
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential debhelper devscripts fakeroot git \
            libpci-dev libusb-1.0-0-dev libfuse-dev pkg-config

      - name: Build x86_64 .deb package
        run: |
          ./scripts/update_deb_ver.sh "$(./scripts/getver.sh)"
          DEB_BUILD_OPTIONS="nocheck nostrip" \
            dpkg-buildpackage -us -uc -a amd64
          ls ..

      - name: Capture UID/GID
        id: uidgid
        run: |
          echo "HOST_UID=$(id -u)" >> $GITHUB_ENV
          echo "HOST_GID=$(id -g)" >> $GITHUB_ENV

      - name: Build arm64 .deb package in Docker
        run: |
          docker run --rm --privileged \
            multiarch/qemu-user-static --reset -p yes

          docker run --rm --platform linux/arm64 \
            -e HOST_UID="${{ env.HOST_UID }}" \
            -e HOST_GID="${{ env.HOST_GID }}" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            arm64v8/ubuntu:22.04 \
            /bin/bash -c "
              apt-get update && \
              apt-get install -y build-essential debhelper devscripts \
                fakeroot gcc git libpci-dev libusb-1.0-0-dev libfuse-dev \
                pkg-config && \
              git config --global --add safe.directory /workspace && \
              ./scripts/update_deb_ver.sh \$(./scripts/getver.sh) && \
              mkdir -p /workspace/build && \
              DEB_BUILD_OPTIONS='nocheck nostrip' \
                dpkg-buildpackage -us -uc -a arm64 && \
              mv -v ../*.deb /workspace/build/ && \
              chown -R \$HOST_UID:\$HOST_GID /workspace/build
            "
          ls -l build/*

      - name: Create source tarball
        run: |
          mkdir -p deb_packages
          version="$(./scripts/getver.sh)"
          tarball="rshim-src-${version}.tar.gz"
          git archive --format=tar.gz -o "$tarball" HEAD
          mv -v "$tarball" deb_packages/

      - name: Move .deb files to deb_packages
        run: |
          mv -v ../*.deb deb_packages/ || echo "No x86_64 .deb found."
          mv -v build/*.deb deb_packages/ || echo "No arm64 .deb found."
          ls -lh deb_packages

      - name: Install QEMU for RPM builds
        run: |
          sudo apt-get install -y qemu-user-static

      - name: Build x86_64 RPM in Rocky Linux
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            rockylinux:8 \
            /bin/bash -c "
              dnf install -y git make automake autoconf libtool gcc rpm-build \
                which python3 && \
              chmod +x build-rpm && \
              ./build-rpm && \
              mkdir -p /workspace/rpm_packages && \
              # For x86_64 RPMs:
              mv -v rpmbuild/RPMS/x86_64/*.rpm /workspace/rpm_packages 2>/dev/null \
                || echo 'No x86_64 RPM found.'
            "
          ls -lh rpm_packages || echo 'No rpm_packages folder yet.'

      - name: Build arm64 RPM in Rocky Linux
        run: |
          docker run --rm --privileged \
            multiarch/qemu-user-static --reset -p yes

          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            rockylinux:8 \
            /bin/bash -c "
              dnf install -y git make automake autoconf libtool gcc rpm-build \
                which python3 && \
              chmod +x build-rpm && \
              ./build-rpm && \
              mkdir -p /workspace/rpm_packages && \
              # For arm64 RPMs:
              mv -v rpmbuild/RPMS/aarch64/*.rpm /workspace/rpm_packages 2>/dev/null \
                || echo 'No arm64 RPM found.'
            "
          ls -lh rpm_packages || echo 'No rpm_packages folder yet.'

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rshim-deb-packages
          path: deb_packages/*.deb

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rshim-rpm-packages
          path: rpm_packages/*.rpm

      - name: Create GitHub Release
        if: startsWith(github.ref_name, 'rshim-')
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: "Release for ${{ github.ref_name }}."
          draft: false
          prerelease: false
          files: |
            deb_packages/*.deb
            deb_packages/*.tar.gz
            rpm_packages/*.rpm
